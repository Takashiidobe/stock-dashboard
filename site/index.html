<!DOCTYPE html>
<html lang="en">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta charset="utf-8" />
    <title>Stock Dashboard</title>

    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Roboto",
          "Oxygen", "Ubuntu", "Helvetica Neue", Arial, sans-serif;
      }
      table {
        font-family: Courier, monospace;
      }
      .stocks-container {
        margin-bottom: 1.5m;
        width: 100%;
        max-width: 600px;
      }
      .stocks-container a {
        text-decoration: none;
      }
      table {
        border-collapse: collapse;
        width: 100%;
        font-size: 1.1em;
      }
      .stock-symbol {
        width: 12%;
        padding: 2px 4px 2px 0px;
      }
      .stock-price,
      .stock-change,
      .stock-change-pct,
      .stock-mkt-cap {
        width: 22%;
        text-align: right;
        padding: 2px 4px;
      }
      @media (max-width: 576px) {
        table {
          margin-bottom: 3em;
        }
        .stock-mkt-cap {
          display: none;
        }
        .stock-symbol {
          width: 16%;
        }
        .stock-price,
        .stock-change,
        .stock-change-pct {
          width: 28%;
        }
        td.stock-symbol,
        td.stock-price,
        td.stock-change,
        td.stock-change-pct {
          padding-top: 1em;
          padding-bottom: 1em;
        }
      }
      summary:hover {
        cursor: pointer;
      }
      summary::-webkit-details-marker {
        display: none;
      }
    </style>
  </head>

  <body>
    <p class="updated-timestamp"></p>
    <div class="stocks-container"></div>

    <p class="attribution">
      Data provided by
      <a href="https://finnhub.io/" target="_blank">Finnhub</a>.
    </p>

    <script>
      "use strict";

      const DEFAULT_PORTFOLIOS = [
        {
          name: "US ETFs",
          symbols: [
            "VOO",
            "VTI",
            "VO",
            "VB",
            "VXUS"
          ],
        },
        {
          name: "MANGA",
          symbols: [
            "META",
            "AMZN",
            "NVDA",
            "GOOGL",
            "AAPL",
          ],
        },
      ];

      const PORTFOLIOS = portfoliosFromQueryParams() || DEFAULT_PORTFOLIOS;
      const REFRESH_SECONDS = 60;
      const BATCH_SIZE = 100;
      const BASE_URL = "/.netlify/functions/quotes";

      let symbols = [];
      let containerDiv = document.querySelector(".stocks-container");
      let updatedDiv = document.querySelector(".updated-timestamp");

      PORTFOLIOS.forEach((p, i) => addPortfolio(p, i === 0));
      symbols = symbols.filter((s, i) => symbols.indexOf(s) === i);
      updateData(true);
      setInterval(updateData, REFRESH_SECONDS * 1000);

      function addPortfolio(portfolio, includeHeader) {
        let tableHeaderHtml = "";
        if (includeHeader) {
          tableHeaderHtml = `
            <thead>
              <tr>
                <th></th>
                <th class="stock-price">Last</th>
                <th class="stock-change">Change</th>
                <th class="stock-change-pct">Change%</th>
                <th class="stock-mkt-cap">Mkt Cap</th>
              </tr>
            </thead>
          `;
        }

        let tableBodyHtml = portfolio.symbols
          .map((symbol) => {
            symbol = symbol.toUpperCase();
            symbols.push(symbol);

            let html = `
            <tr data-symbol="${symbol}">
              <td class="stock-symbol"><a href="${symbolUrl(
                symbol
              )}" target="_blank">${symbol}</a></td>
              <td class="stock-price"></td>
              <td class="stock-change"></td>
              <td class="stock-change-pct"></td>
              <td class="stock-mkt-cap"></td>
            </tr>
          `;

            return html;
          })
          .join("");

        let portfolioDiv = document.createElement("div");

        portfolioDiv.innerHTML = `
          <details open>
            <summary><h2>${portfolio.name}</h2></summary>
            <table>${tableHeaderHtml}<tbody>${tableBodyHtml}</tbody></table>
          </details>
        `;

        containerDiv.appendChild(portfolioDiv);
      }

      function updateData(addTitle) {
        let numberOfBatches = Math.ceil(symbols.length / BATCH_SIZE);
        let updates = [];

        for (let i = 0; i < numberOfBatches; i++) {
          let symbolsBatch = symbols.slice(
            i * BATCH_SIZE,
            (i + 1) * BATCH_SIZE
          );
          updates.push(updateDataForBatch(symbolsBatch, addTitle));
        }

        Promise.all(updates)
          .then(() => {
            updatedDiv.innerHTML = `Data updated at ${new Date().toLocaleString()}`;
          })
          .catch(() => {
            updatedDiv.innerHTML = `Data update failed at ${new Date().toLocaleString()}`;
          });
      }

      function updateDataForBatch(symbols, addTitle) {
        let url = `${BASE_URL}?symbols=${symbols.join(",")}`;
        if (addTitle) url += "&profile=1";

        return fetch(url)
          .then((response) => {
            if (!response.ok) throw new Error("Could not fetch quotes");
            return response;
          })
          .then((response) => response.json())
          .then((json) => {
            symbols.forEach((symbol) => {
              let data = json[symbol];
              if (typeof data === "undefined" || !data.latestPrice)
                return;

              let formattedPrice = formatQuote(Number(data.latestPrice));
              let formattedChange = formatChange(data.change);
              let formattedChangePercent = formatChangePercent(
                data.changePercent
              );
              let formattedMarketCap = formatMarketCap(data.marketCap);
              let bgColorStyle = calculateBgColorStyle(
                data.changePercent
              );

              document
                .querySelectorAll(`[data-symbol="${symbol}"] .stock-price`)
                .forEach((e) => {
                  e.innerHTML = formattedPrice;
                  e.setAttribute("style", bgColorStyle);
                });

              document
                .querySelectorAll(`[data-symbol="${symbol}"] .stock-change`)
                .forEach((e) => {
                  e.innerHTML = formattedChange;
                  e.setAttribute("style", bgColorStyle);
                });

              document
                .querySelectorAll(`[data-symbol="${symbol}"] .stock-change-pct`)
                .forEach((e) => {
                  e.innerHTML = formattedChangePercent;
                  e.setAttribute("style", bgColorStyle);
                });

              document
                .querySelectorAll(`[data-symbol="${symbol}"] .stock-mkt-cap`)
                .forEach((e) => {
                  if (data.marketCap !== undefined) e.innerHTML = formattedMarketCap;
                  e.setAttribute("style", bgColorStyle);
                });

              if (addTitle) {
                document
                  .querySelectorAll(`[data-symbol="${symbol}"] .stock-symbol a`)
                  .forEach((e) => {
                    e.setAttribute("title", data.companyName);
                  });
              }
            });
          });
      }

      function portfoliosFromQueryParams() {
        if (!window.location.search) return;

        let params = new URLSearchParams(window.location.search);
        let portfolios = [];

        for (let p of params) {
          portfolios.push({ name: p[0], symbols: p[1].split(",") });
        }

        return portfolios;
      }

      function symbolUrl(symbol) {
        return `https://stock-charts.takashiidobe.com/?q=${symbol}&t=fiveYears`;
      }

      function formatChange(value) {
        if (value === null || value === undefined) return "";
        return value.toLocaleString("en", { minimumFractionDigits: 2 });
      }

      function formatChangePercent(value) {
        if (value === null || value === undefined) return "";
        return (value * 100).toFixed(1) + "%";
      }

      function formatQuote(value) {
        let options = {
          minimumFractionDigits: 2,
          style: "currency",
          currency: "USD",
        };
        return value.toLocaleString("en", options);
      }

      function formatMarketCap(marketCap) {
        if (marketCap === null || marketCap === 0 || marketCap === undefined)
          return "";

        let value, suffix;
        if (marketCap >= 1e12) {
          value = marketCap / 1e12;
          suffix = "T";
        } else if (marketCap >= 1e9) {
          value = marketCap / 1e9;
          suffix = "B";
        } else {
          value = marketCap / 1e6;
          suffix = "M";
        }

        let digits = value < 10 ? 1 : 0;

        return "$" + value.toFixed(digits) + suffix;
      }

      function calculateBgColorStyle(changePercent) {
        if (changePercent === undefined) return "";

        let rgbColor = changePercent > 0 ? "0,255,0" : "255,0,0";
        let rgbOpacity = Math.min(Math.abs(changePercent) * 20, 1);

        return `background-color: rgba(${rgbColor}, ${rgbOpacity})`;
      }
    </script>
  </body>
</html>
